<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>中国象棋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1a1a2e}
body{
  display:flex;flex-direction:column;align-items:center;
  font-family:'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
/* 棋盘容器 */
.board-box{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;padding:4px;min-height:0;
}
canvas#board{
  display:block;border-radius:4px;cursor:pointer;
  max-width:100%;max-height:100%;
  width:auto;height:auto;
}
/* 底部控制栏 */
.control-bar{
  flex:none;width:100%;max-width:520px;
  display:flex;flex-direction:column;gap:4px;
  padding:4px 6px 10px;
}
.ctrl-row{
  display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;
}
.info{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;
}
.turn-badge{
  background:rgba(0,0,0,.4);color:#ffebc0;border-radius:16px;
  padding:4px 12px;font-weight:bold;font-size:clamp(12px,4vw,16px);white-space:nowrap;
}
.status{
  color:#d4c090;font-size:clamp(11px,3.5vw,14px);
}
.btns{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:center;
}
.btn{
  border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-family:inherit;
  padding:6px 14px;font-size:clamp(13px,4.5vw,16px);transition:all .1s;
  color:#fff;line-height:1.2;
}
.btn:active{filter:brightness(.85);transform:scale(.96)}
.btn-new{background:#e74c3c}
.btn-undo{background:#f39c12}
.btn-pass{background:#3498db}
.diff-group{display:flex;gap:3px}
.diff-btn{
  border:2px solid rgba(255,255,255,.3);border-radius:10px;
  background:transparent;color:#b8a878;font-weight:bold;cursor:pointer;font-family:inherit;
  padding:4px 10px;font-size:clamp(11px,3.8vw,14px);transition:all .1s;
}
.diff-btn:active{background:rgba(255,255,200,.1)}
.diff-btn.on{border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,.15)}
.toast{
  position:fixed;top:12%;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.85);color:#fff;padding:10px 24px;border-radius:10px;
  font-size:clamp(14px,4.5vw,18px);z-index:999;opacity:0;transition:opacity .3s;
  pointer-events:none;text-align:center;backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);max-width:88vw;line-height:1.5;
}
.toast.on{opacity:1}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="board-box" id="boardBox">
  <canvas id="board"></canvas>
</div>

<div class="control-bar">
  <div class="ctrl-row">
    <div class="info">
      <span class="turn-badge" id="turnBadge">🔴 红方</span>
      <span class="status" id="statusText">点击棋子</span>
    </div>
  </div>
  <div class="ctrl-row">
    <div class="btns">
      <div class="diff-group">
        <button class="diff-btn" data-d="2">简单</button>
        <button class="diff-btn on" data-d="4">中等</button>
        <button class="diff-btn" data-d="6">困难</button>
      </div>
      <button class="btn btn-pass" id="passBtn">⏭ AI走</button>
      <button class="btn btn-undo" id="undoBtn">↩ 悔棋</button>
      <button class="btn btn-new" id="newBtn">新局</button>
    </div>
  </div>
</div>

<script>
// ===================================================================
// 引擎
// ===================================================================
const GEN=0,ADVISOR=1,ELEPHANT=2,HORSE=3,CHARIOT=4,CANNON=5,SOLDIER=6;
const NB=['将','士','象','马','车','炮','卒'];
const NR=['帅','仕','相','馬','車','砲','兵'];
const RED=0,BLACK=1;
function opp(c){return c^1}

class Board{
  constructor(){this.reset()}
  reset(){
    this.b=Array.from({length:10},()=>Array(9).fill(null));
    this.turn=RED;this.history=[];
    const RR=[{t:CHARIOT},{t:HORSE},{t:ELEPHANT},{t:ADVISOR},{t:GEN},{t:ADVISOR},{t:ELEPHANT},{t:HORSE},{t:CHARIOT}];
    for(let x=9;x--;)this.b[9][x]={...RR[x],c:RED};
    const BB=[{t:CHARIOT},{t:HORSE},{t:ELEPHANT},{t:ADVISOR},{t:GEN},{t:ADVISOR},{t:ELEPHANT},{t:HORSE},{t:CHARIOT}];
    for(let x=9;x--;)this.b[0][x]={...BB[x],c:BLACK};
    this.b[7][1]=this.b[7][7]={t:CANNON,c:RED};
    this.b[2][1]=this.b[2][7]={t:CANNON,c:BLACK};
    for(let x of[0,2,4,6,8]){this.b[6][x]={t:SOLDIER,c:RED};this.b[3][x]={t:SOLDIER,c:BLACK}}
  }
  genRaw(x,y){
    const p=this.b[y][x];if(!p)return[];
    const{t,c:color}=p,moves=[];
    const ok=(tx,ty)=>{
      if(tx<0||tx>8||ty<0||ty>9)return;
      if(this.b[ty][tx]&&this.b[ty][tx].c===color)return;
      moves.push({fx:x,fy:y,tx,ty});
    };
    switch(t){
      case GEN:
        for(const[dx,dy] of[[0,1],[0,-1],[1,0],[-1,0]]){
          const nx=x+dx,ny=y+dy;
          if(ny<=(color?2:9)&&ny>=(color?0:7)&&nx>=3&&nx<=5)ok(nx,ny)
        }
        const og=this.findGen(opp(color));
        if(og&&og.x===x){
          let blocked=0;
          for(let yy=Math.min(y,og.y)+1;yy<Math.max(y,og.y);yy++){if(this.b[yy][x]){blocked=1;break}}
          if(!blocked)ok(og.x,og.y)
        }
        break;
      case ADVISOR:
        for(const[dx,dy] of[[1,1],[1,-1],[-1,1],[-1,-1]]){
          const nx=x+dx,ny=y+dy;
          if(ny<=(color?2:9)&&ny>=(color?0:7)&&nx>=3&&nx<=5)ok(nx,ny)
        }
        break;
      case ELEPHANT:
        for(const[dx,dy,ex,ey] of[[2,2,1,1],[2,-2,1,-1],[-2,2,-1,1],[-2,-2,-1,-1]]){
          const nx=x+dx,ny=y+dy,bx=x+ex,by=y+ey;
          if(nx<0||nx>8||ny<0||ny>9)continue;
          if(color===RED&&ny<5)continue;if(color===BLACK&&ny>4)continue;
          if(this.b[by][bx])continue;ok(nx,ny)
        }
        break;
      case HORSE:
        for(const[dx,dy,bx,by] of[[1,2,0,1],[1,-2,0,-1],[-1,2,0,1],[-1,-2,0,-1],[2,1,1,0],[2,-1,1,0],[-2,1,-1,0],[-2,-1,-1,0]]){
          const nx=x+dx,ny=y+dy,ex=x+bx,ey=y+by;
          if(nx<0||nx>8||ny<0||ny>9)continue;
          if(this.b[ey][ex])continue;ok(nx,ny)
        }
        break;
      case CHARIOT:
        for(const[dx,dy] of[[0,1],[0,-1],[1,0],[-1,0]]){
          let nx=x+dx,ny=y+dy;
          while(nx>=0&&nx<=8&&ny>=0&&ny<=9){
            const d=this.b[ny][nx];
            if(!d)ok(nx,ny);else{if(d.c!==color)ok(nx,ny);break}
            nx+=dx;ny+=dy;
          }
        }
        break;
      case CANNON:
        for(const[dx,dy] of[[0,1],[0,-1],[1,0],[-1,0]]){
          let nx=x+dx,ny=y+dy,screen=0;
          while(nx>=0&&nx<=8&&ny>=0&&ny<=9){
            const d=this.b[ny][nx];
            if(!screen){if(!d)ok(nx,ny);else screen=1}
            else{if(d){if(d.c!==color)ok(nx,ny);break}}
            nx+=dx;ny+=dy;
          }
        }
        break;
      case SOLDIER:
        if(color===RED){ok(x,y-1);if(y<=4){ok(x-1,y);ok(x+1,y)}}
        else{ok(x,y+1);if(y>=5){ok(x-1,y);ok(x+1,y)}}
        break;
    }
    return moves;
  }
  allLegal(color){
    const r=[];
    for(let y=10;y--;)for(let x=9;x--;){
      const p=this.b[y][x];if(!p||p.c!==color)continue;
      for(const m of this.genRaw(x,y))if(this.isLegal(m))r.push(m);
    }
    return r;
  }
  isLegal(m){
    const cp=this.b[m.ty][m.tx];
    this.b[m.ty][m.tx]=this.b[m.fy][m.fx];this.b[m.fy][m.fx]=null;
    const ok=!this.inCheck(this.turn);
    this.b[m.fy][m.fx]=this.b[m.ty][m.tx];this.b[m.ty][m.tx]=cp;
    return ok;
  }
  doMove(m){
    const cp=this.b[m.ty][m.tx];
    this.b[m.ty][m.tx]=this.b[m.fy][m.fx];this.b[m.fy][m.fx]=null;
    this.history.push({move:m,captured:cp});this.turn=opp(this.turn);
    return cp;
  }
  undo(){
    const e=this.history.pop();if(!e)return null;
    const{move:m,captured:c}=e;
    this.b[m.fy][m.fx]=this.b[m.ty][m.tx];this.b[m.ty][m.tx]=c;
    this.turn=opp(this.turn);return e;
  }
  findGen(color){
    for(let y=10;y--;)for(let x=9;x--;){
      const p=this.b[y][x];if(p&&p.t===GEN&&p.c===color)return{x,y};
    }
    return null;
  }
  inCheck(color){
    const g=this.findGen(color);if(!g)return 1;
    const oc=opp(color);
    for(let y=10;y--;)for(let x=9;x--;){
      const p=this.b[y][x];if(!p||p.c!==oc)continue;
      for(const m of this.genRaw(x,y))if(m.tx===g.x&&m.ty===g.y)return 1;
    }
    return 0;
  }
  isMated(color){return this.allLegal(color).length===0}
}
const PV=[10000,300,300,500,1000,500,100];
Board.prototype.evaluate=function(){
  let s=0;
  for(let y=10;y--;)for(let x=9;x--;){
    const p=this.b[y][x];if(!p)continue;
    const v=PV[p.t];s+=p.c===RED?v:-v;
    // 位置奖励：兵过河 马中心 车要道
    if(p.t===SOLDIER){if(p.c===RED&&y<=4)s+=8*(5-y);else if(p.c===BLACK&&y>=5)s+=8*(y-4)}
    if(p.t===HORSE)s+=p.c===RED?(4-Math.abs(x-4))*4:(4-Math.abs(x-4))*4;
    if(p.t===CHARIOT&&x>=1&&x<=7)s+=p.c===RED?6:-6;
  }
  return s;
};

// ========== AI 搜索 ==========
function searchBest(board,depth){
  function ab(d,a,b,isMax){
    if(d===0)return board.evaluate();
    const ms=board.allLegal(board.turn);
    if(ms.length===0)return isMax?-99999:99999;
    ms.sort((x,y)=>{
      const px=board.b[x.ty][x.tx],py=board.b[y.ty][y.tx];
      return(py?PV[py.t]:0)-(px?PV[px.t]:0);
    });
    if(isMax){let best=-1e9;for(const m of ms){board.doMove(m);const v=ab(d-1,a,b,0);board.undo();if(v>best)best=v;if(v>a)a=v;if(a>=b)break}return best}
    else{let best=1e9;for(const m of ms){board.doMove(m);const v=ab(d-1,a,b,1);board.undo();if(v<best)best=v;if(v<b)b=v;if(b<=a)break}return best}
  }
  const ms=board.allLegal(board.turn);
  if(!ms.length)return null;
  ms.sort((x,y)=>{
    const px=board.b[x.ty][x.tx],py=board.b[y.ty][y.tx];
    return(py?PV[py.t]:0)-(px?PV[px.t]:0);
  });
  let best=ms[0],bestVal,a=-1e9,b=1e9,isMax=board.turn===RED;
  if(isMax){bestVal=-1e9;for(const m of ms){board.doMove(m);const v=ab(depth-1,a,b,0);board.undo();if(v>bestVal){bestVal=v;best=m}if(v>a)a=v;if(a>=b)break}}
  else{bestVal=1e9;for(const m of ms){board.doMove(m);const v=ab(depth-1,a,b,1);board.undo();if(v<bestVal){bestVal=v;best=m}if(v<b)b=v;if(b<=a)break}}
  return best;
}

// ===================================================================
// 渲染
// ===================================================================
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
const box=document.getElementById('boardBox');
const badge=document.getElementById('turnBadge');
const stxt=document.getElementById('statusText');
const toast=document.getElementById('toast');
const LOGICAL=520; // 逻辑分辨率

canvas.width=LOGICAL;canvas.height=Math.round(LOGICAL*9/8);

function cellSize(){
  // 用逻辑坐标固定绘制，CSS max-width 缩放
  // 返回逻辑棋盘参数
  const W=LOGICAL;
  const cw=W/10,H=W*9/8;
  const CELL=Math.floor(W/10),OFF=Math.floor((W-CELL*8)/2);
  return{CELL,OFF,W,H};
}
function toPixel(c,r){const p=cellSize();if(flipped){c=8-c;r=9-r}return{x:p.OFF+c*p.CELL,y:p.OFF+r*p.CELL}}

// 点击坐标转换：屏幕坐标 → 逻辑坐标 → 棋盘坐标
function logicalXY(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  const lx=(t.clientX-r.left)/r.width*canvas.width;
  const ly=(t.clientY-r.top)/r.height*canvas.height;
  return{x:lx,y:ly};
}
function toBoard(lx,ly){
  const p=cellSize();
  let dc=Math.round((lx-p.OFF)/p.CELL),dr=Math.round((ly-p.OFF)/p.CELL);
  if(dc<0||dc>8||dr<0||dr>9)return null;
  // 显示坐标 → 逻辑坐标
  let lc=dc,lr=dr;
  if(flipped){lc=8-dc;lr=9-dr}
  const cp=toPixel(lc,lr);
  if(Math.hypot(lx-cp.x,ly-cp.y)>p.CELL*0.48)return null;
  return{x:lc,y:lr};
}

// ----- 绘画 -----
function draw(){
  const p=cellSize(),C=p.CELL,O=p.OFF,W=p.W,H=p.H;
  ctx.clearRect(0,0,W,H);
  const g=ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#f0c878');g.addColorStop(.5,'#e8bc60');g.addColorStop(1,'#daa850');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#4a3520';ctx.lineWidth=Math.max(1,C/25);
  ctx.strokeRect(O-2,O-2,C*8+4,C*9+4);
  const lw=Math.max(.8,C/42);
  ctx.lineWidth=lw;

  for(let r=10;r--;){const a=toPixel(0,r),b=toPixel(8,r);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
  for(let c=9;c--;){
    if(c===0||c===8){const a=toPixel(c,0),b=toPixel(c,9);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
    else{const a=toPixel(c,0),b=toPixel(c,4),c2=toPixel(c,5),d=toPixel(c,9);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.beginPath();ctx.moveTo(c2.x,c2.y);ctx.lineTo(d.x,d.y);ctx.stroke()}
  }
  for(const[x1,y1,x2,y2] of[[3,0,5,2],[3,2,5,0],[3,7,5,9],[3,9,5,7]]){const a=toPixel(x1,y1),b=toPixel(x2,y2);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}

  ctx.fillStyle='#6b5030';ctx.font='bold '+Math.round(C*.33)+'px "KaiTi","STKaiti",serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const ry=toPixel(0,4.5).y;ctx.fillText('楚  河',O+C*2,ry);ctx.fillText('漢  界',O+C*6,ry);

  ctx.lineWidth=Math.max(.7,C/50);
  // 正规十字花（星位）：兵行线 炮位 边角
  // 炮位(宫顶线): 仅第1,7列
  for(const c of[1,7]){drawStar(C,O,c,2);drawStar(C,O,c,7)}
  // 兵行线: 5个兵位
  for(const c of[0,2,4,6,8]){drawStar(C,O,c,3);drawStar(C,O,c,6)}
  // 仅兵线、炮位有十字花，其它地方没有

  // 选中
  if(sel){
    const q=toPixel(sel.x,sel.y);
    ctx.fillStyle='rgba(255,215,0,.35)';ctx.fillRect(q.x-C/2,q.y-C/2,C,C);
    ctx.strokeStyle='rgba(255,215,0,.7)';ctx.lineWidth=Math.max(1.5,C/18);
    ctx.strokeRect(q.x-C/2,q.y-C/2,C,C);
  }
  for(const m of valid){
    const q=toPixel(m.tx,m.ty);
    if(board.b[m.ty][m.tx]){ctx.strokeStyle='rgba(255,60,60,.55)';ctx.lineWidth=Math.max(1.5,C/18);ctx.beginPath();ctx.arc(q.x,q.y,C*.41,0,6.29);ctx.stroke()}
    else{ctx.fillStyle='rgba(0,220,80,.3)';ctx.beginPath();ctx.arc(q.x,q.y,Math.max(4,C*.11),0,6.29);ctx.fill()}
  }
  if(board.history.length){
    const lm=board.history[board.history.length-1].move;
    for(const[lx,ly] of[[lm.fx,lm.fy],[lm.tx,lm.ty]]){const q=toPixel(lx,ly);ctx.fillStyle='rgba(80,180,255,.15)';ctx.fillRect(q.x-C/2,q.y-C/2,C,C)}
  }

  // 棋子
  const fs=Math.round(C*.36);
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let y=10;y--;)for(let x=9;x--;){
    const p=board.b[y][x];if(!p)continue;
    const q=toPixel(x,y),isRed=p.c===RED;
    ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.arc(q.x+1,q.y+2,C*.42,0,6.29);ctx.fill();
    const gg=ctx.createRadialGradient(q.x-C*.08,q.y-C*.08,C*.04,q.x,q.y,C*.43);
    if(isRed){gg.addColorStop(0,'#ffe8d8');gg.addColorStop(.6,'#f0c8a8');gg.addColorStop(1,'#c89070')}
    else{gg.addColorStop(0,'#e8f0e8');gg.addColorStop(.6,'#c8d0c8');gg.addColorStop(1,'#90a090')}
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(q.x,q.y,C*.42,0,6.29);ctx.fill();
    ctx.strokeStyle=isRed?'#b04030':'#304050';ctx.lineWidth=Math.max(1,C/28);
    ctx.beginPath();ctx.arc(q.x,q.y,C*.42,0,6.29);ctx.stroke();
    if(p.t===GEN||p.t===ADVISOR){ctx.strokeStyle=isRed?'#b04030':'#304050';ctx.lineWidth=Math.max(.7,C/45);ctx.beginPath();ctx.arc(q.x,q.y,C*.27,0,6.29);ctx.stroke()}
    ctx.fillStyle=isRed?'#c02010':'#182838';
    ctx.font='bold '+fs+'px "KaiTi","STKaiti","Noto Sans SC",serif';
    ctx.fillText(isRed?NR[p.t]:NB[p.t],q.x,q.y+1);
  }
}
function drawStar(C,O,x,y){
  // 十字花：在每个星位画4个L形角花，开口朝向交叉点
  const p=toPixel(x,y);
  // 臂长加大让手机上清晰可见
  const hl=Math.max(7,C*0.18);  // 水平臂长
  const vl=Math.max(7,C*0.18);  // 垂直臂长
  const gap=Math.max(2,C*0.04); // 距交叉点的间隙
  const off=Math.max(3,C*0.05); // 距单元格边
  ctx.strokeStyle='#3a2510';ctx.lineWidth=Math.max(1.5,C/28);
  const lines=[];
  // 左 x>0: 水平线从左向右（上下各一条）
  if(x>0){lines.push([p.x-C/2+off,p.y-gap,p.x-C/2+off+hl,p.y-gap],[p.x-C/2+off,p.y+gap,p.x-C/2+off+hl,p.y+gap])}
  // 右 x<8: 水平线从右向左
  if(x<8){lines.push([p.x+C/2-off,p.y-gap,p.x+C/2-off-hl,p.y-gap],[p.x+C/2-off,p.y+gap,p.x+C/2-off-hl,p.y+gap])}
  // 上 y>0: 竖线从上向下
  if(y>0){lines.push([p.x-gap,p.y-C/2+off,p.x-gap,p.y-C/2+off+vl],[p.x+gap,p.y-C/2+off,p.x+gap,p.y-C/2+off+vl])}
  // 下 y<9: 竖线从下向上
  if(y<9){lines.push([p.x-gap,p.y+C/2-off,p.x-gap,p.y+C/2-off-vl],[p.x+gap,p.y+C/2-off,p.x+gap,p.y+C/2-off-vl])}
  for(const[sx,sy,ex,ey] of lines){ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke()}
}

// ========== 游戏 ==========
let board=new Board(),sel=null,valid=[],gameOver=0,aiBusy=0,aiDepth=4,flipped=0;

function showToast(t,d){toast.textContent=t;toast.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove('on'),d||2200)}
function ui(){
  if(gameOver){badge.textContent='🏆 '+(board.turn===RED?'黑方':'红方')+'胜利！';stxt.textContent='新局';return}
  if(aiBusy){badge.textContent='🤔 AI思考中';stxt.textContent='请稍候…';return}
  // 考虑翻转: 玩家应看到自己的颜色
  const pColor=flipped?board.turn:board.turn; // 显示的走棋方 = 实际走棋方
  badge.textContent=board.turn===RED?'🔴 红方走棋':'⚫ 黑方走棋';
  stxt.textContent=sel?'点击目标':'点击棋子'
}
function selPiece(x,y){
  sel={x,y};valid=[];
  for(const m of board.genRaw(x,y))if(board.isLegal(m))valid.push(m);
  draw();ui()
}
function onInput(px,py){
  if(gameOver||aiBusy)return;
  const pos=toBoard(px,py);if(!pos)return;
  const c=board.b[pos.y][pos.x];
  if(sel){
    const mv=valid.find(m=>m.tx===pos.x&&m.ty===pos.y);
    if(mv){var cp=board.doMove(mv);sfx(cp);sel=null;valid=[];draw();ui();checkState();return}
    if(c&&c.c===board.turn){selPiece(pos.x,pos.y);return}
    sel=null;valid=[];draw();ui();return
  }
  if(c&&c.c===board.turn)selPiece(pos.x,pos.y)
}
function checkState(){
  if(gameOver)return;
  if(board.isMated(board.turn)){gameOver=1;draw();ui();showToast('🏆 '+(board.turn===RED?'黑方':'红方')+'将杀！',3500);return}
  if(board.inCheck(board.turn))showToast('⚠️ 将军！');
  // AI颜色: 翻转时AI执红, 否则执黑
  const aiColor=flipped?RED:BLACK;
  if(!gameOver&&board.turn===aiColor)runAI()
}
function runAI(){aiBusy=1;ui();setTimeout(()=>{
  const m=searchBest(board,aiDepth);
  if(m&&!gameOver){var cp=board.doMove(m);sfx(cp);sel=null;valid=[];draw();aiBusy=0;ui();checkState()}
  else{aiBusy=0;ui()}
},10)}
function newGame(){board=new Board();sel=null;valid=[];gameOver=0;aiBusy=0;flipped=0;draw();ui();showToast('红方先行')}
function undoMove(){
  if(gameOver||aiBusy||!board.history.length)return;
  board.undo();if(board.history.length>0)board.undo();sel=null;valid=[];gameOver=0;draw();ui()
}
function passTurn(){
  // 翻转棋盘: 玩家改执黑方, AI执红方
  if(gameOver||aiBusy)return;
  flipped=1;sel=null;valid=[];draw();ui();
  showToast('AI执红先行 · 您执黑');
  // AI走第一步（红方）
  aiBusy=1;ui();setTimeout(()=>{
    const m=searchBest(board,aiDepth);
    if(m&&!gameOver){var cp=board.doMove(m);sfx(cp);draw()}
    aiBusy=0;ui();if(!gameOver&&board.inCheck(board.turn))showToast('⚠️ 将军！')
  },10)
}

// ========== 事件 ==========
const handler=e=>{e.preventDefault();const p=logicalXY(e);onInput(p.x,p.y)};
canvas.addEventListener('click',handler);
canvas.addEventListener('touchstart',handler,{passive:false});

document.getElementById('newBtn').addEventListener('click',newGame);
document.getElementById('undoBtn').addEventListener('click',undoMove);
document.getElementById('passBtn').addEventListener('click',passTurn);
document.querySelectorAll('.diff-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');aiDepth=parseInt(b.dataset.d);showToast('难度: '+b.textContent)
  });
});
